<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentOn - Agenda Interativa</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="app-layout">
        <!-- Sidebar lateral -->
        <aside class="sidebar">
            <div>
                <a href="index.html" class="sidebar-logo">

                        <path d="M6 5C6 3.5 7.5 2 10 2C11.5 2 12 3 12 3C12 3 12.5 2 14 2C16.5 2 18 3.5 18 5C18 7.5 17 11 16.5 13.5C16 16 17 18 16 20.5C15 23 13 22 12 21C11 22 9 23 8 20.5C7 18 8 16 7.5 13.5C7 11 6 7.5 6 5Z" />
                        <path d="M12 6V15" opacity="0.3"/>
                    </svg>
                    <span>DentOn</span>
                </a>
                <ul class="sidebar-menu">
                    <li class="sidebar-menu-item">
                        <a href="dashboard.html">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="7" height="9"/>
                                <rect x="14" y="3" width="7" height="5"/>
                                <rect x="14" y="12" width="7" height="9"/>
                                <rect x="3" y="16" width="7" height="5"/>
                            </svg>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item active">
                        <a href="agenda.html">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            <span>Agenda</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="prontuario.html">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                                <polyline points="10 9 9 9 8 9"/>
                            </svg>
                            <span>Prontuários</span>
                        </a>
                    </li>
                    <li class="sidebar-menu-item">
                        <a href="analytics.html">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="20" x2="18" y2="10"/>
                                <line x1="12" y1="20" x2="12" y2="4"/>
                                <line x1="6" y1="20" x2="6" y2="14"/>
                            </svg>
                            <span>Analytics</span>
                        </a>
                    </li>
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-profile-badge">
                    <div class="user-avatar" id="sidebar-avatar">JC</div>
                    <div class="user-info">
                        <span class="user-name" id="sidebar-name">Dr. João Vitor Coelho</span>
                        <span class="user-role" id="sidebar-cro">CRO-RJ 12345</span>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Sair da Conta</span>
                </button>
            </div>
        </aside>

        <!-- Área de conteúdo principal -->
        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <h1>Agenda de Consultas</h1>
                    <p>Agende e gerencie os horários dos seus atendimentos.</p>
                </div>
                <button class="btn btn-primary" onclick="openNewAppointmentModal()" style="width: auto;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    <span>Novo Agendamento</span>
                </button>
            </header>

            <div class="page-body">
                <!-- Controles do Calendário -->
                <div class="calendar-controls">
                    <div class="date-navigation">
                        <button class="btn btn-secondary btn-sm" onclick="navigateToToday()">Hoje</button>
                        <button class="btn btn-secondary btn-sm" onclick="navigateOffset(-1)" style="padding: 6px 10px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"/>
                            </svg>
                        </button>
                        <span class="date-indicator" id="calendar-date-label">Maio de 2026</span>
                        <button class="btn btn-secondary btn-sm" onclick="navigateOffset(1)" style="padding: 6px 10px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </button>
                    </div>

                    <div class="view-toggle">
                        <button class="view-toggle-btn active" id="btn-view-month" onclick="changeCalendarView('month')">Mês</button>
                        <button class="view-toggle-btn" id="btn-view-week" onclick="changeCalendarView('week')">Semana</button>
                        <button class="view-toggle-btn" id="btn-view-day" onclick="changeCalendarView('day')">Dia</button>
                    </div>
                </div>

                <!-- Container do Grid do Calendário -->
                <div class="calendar-view-container" id="calendar-grid-container">
                    <!-- Será gerado dinamicamente via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL DE AGENDAMENTO (CRIAR E EDITAR) -->
    <div id="appointment-modal" class="modal-backdrop">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Novo Agendamento</h2>
                <button class="modal-close" onclick="closeAppointmentModal()">✕</button>
            </div>
            <form id="appointment-form" onsubmit="handleAppointmentSubmit(event)">
                <input type="hidden" id="app-id">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="app-patient">Paciente</label>
                        <select id="app-patient" class="form-control" required>
                            <!-- Pacientes carregados via JS -->
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="app-procedure">Procedimento</label>
                        <select id="app-procedure" class="form-control" required>
                            <!-- Procedimentos carregados via JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="app-date">Data da Consulta</label>
                        <input type="date" id="app-date" class="form-control" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="app-time-start">Hora de Início</label>
                            <input type="time" id="app-time-start" class="form-control" step="900" required>
                        </div>
                        <div class="form-group">
                            <label for="app-time-end">Hora de Término</label>
                            <input type="time" id="app-time-end" class="form-control" step="900" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="app-status">Status do Agendamento</label>
                        <select id="app-status" class="form-control" required>
                            <option value="pending">Aguardando Confirmação</option>
                            <option value="confirmed">Confirmado</option>
                            <option value="completed">Concluído</option>
                            <option value="canceled">Cancelado</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="app-notes">Observações Clínicas / Notas</label>
                        <textarea id="app-notes" class="form-control" rows="3" placeholder="Ex: Paciente com dor leve, restauração estética posterior..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="btn-delete-app" class="btn btn-secondary" style="background-color: #fee2e2; color: #ef4444; border-color: #fca5a5; margin-right: auto; display: none;" onclick="handleDeleteAppointment()">Excluir Agendamento</button>
                    <button type="button" class="btn btn-secondary" onclick="closeAppointmentModal()" style="width: auto;">Voltar</button>
                    <button type="submit" class="btn btn-primary" style="width: auto;">Salvar Agendamento</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/agenda.js"></script>
</body>
</html>
